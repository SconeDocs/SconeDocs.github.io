    <!-- Built-time script injection keeps version-prefix handling in sync with versions.yml. -->
        <script>
      // GitHub Pages serves the root 404 for unknown paths. We use that as a
      // fallback entrypoint: if an unversioned path exists under /latest/,
      // redirect there; otherwise keep the real 404 page visible.
      const knownPrefixes = ["6.0", "7.0", "latest"];
      const path = window.location.pathname;
      const trimmedPath = path.replace(/^\/+/u, "");
      const pathSegments = trimmedPath.split("/").filter(Boolean);
      const firstSegment = pathSegments[0] || "";

      async function maybeRedirect() {
        if (knownPrefixes.includes(firstSegment)) {
          return;
        }

        const candidates = new Set([path]);
        if (!path.endsWith("/") && !/\.[^/]+$/u.test(path)) {
          candidates.add(`${path}/`);
        }
        if (path !== "/" && path.endsWith("/")) {
          candidates.add(path.slice(0, -1));
        }

        try {
          // latest-paths.json is generated at build time from the rendered
          // /latest tree. It lets us distinguish "missing version prefix" from
          // "page truly does not exist" before redirecting.
          const response = await fetch("/latest-paths.json", { cache: "no-store" });
          if (!response.ok) {
            return;
          }
          const latestPaths = new Set(await response.json());
          const match = Array.from(candidates).find(candidate => latestPaths.has(candidate));
          if (!match) {
            return;
          }
          const encodedPath = match.split("/").map(segment => encodeURIComponent(segment)).join("/");
          window.location.replace(`/latest${encodedPath}${window.location.search}${window.location.hash}`);
        } catch (_error) {
          return;
        }
      }

      maybeRedirect();
    </script>

  </head>
  <body dir="ltr" data-md-color-scheme="" data-md-color-primary="white" data-md-color-accent="purple">

        <section class="md-typeset" style="text-align: center; padding: 4rem 0;">

    <p>The page you requested does not exist in this documentation version.</p>

        Go to docs home
      </a>
    </p>
  </div>
</section>
